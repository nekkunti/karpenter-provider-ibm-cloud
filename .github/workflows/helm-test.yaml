name: Test Helm Chart

on:
  pull_request:
    paths:
      - 'charts/**'
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Install Helm
      id: install-helm
      run: |
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod +x get_helm.sh
        ./get_helm.sh

    - name: Create test values
      id: create-test-values
      run: |
        cat > charts/ci-values.yaml << EOF
        credentials:
          ibmApiKey: "ci-test-key"
          region: "us-south"
          vpcApiKey: "ci-test-vpc-key"
          vpcUrl: "https://us-south.iaas.cloud.ibm.com/v1"
        additionalCAs:
          enabled: true
          certs:
            cluster-ca: |
              -----BEGIN CERTIFICATE-----
              CI TEST CA
              -----END CERTIFICATE-----
        EOF

    - name: Create yamllint config
      id: create-yamllint-config
      run: |
        cat > .yamllint << EOF
        extends: default
        rules:
          document-start: disable
          line-length: disable
        EOF

    - name: Run tests
      id: run-tests
      working-directory: charts
      run: |
        # Lint chart with test values
        helm lint . -f ci-values.yaml

        # Validate template rendering
        helm template . -f ci-values.yaml > rendered.yaml
        grep -q 'name: ca_crt' rendered.yaml
        grep -q 'key: ca_crt' rendered.yaml
