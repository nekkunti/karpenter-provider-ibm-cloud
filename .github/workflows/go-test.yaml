name: Go Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'charts/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'charts/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      id: checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '1.26'
        cache: true

    - name: Install controller-gen
      run: |
        go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest
        mkdir -p ~/.local/share/go/bin
        mv ~/go/bin/controller-gen ~/.local/share/go/bin/

    - name: Install mockgen
      run: |
        go install github.com/golang/mock/mockgen@v1.6.0

    - name: Verify vendor is up to date
      run: |
        make vendor
        git diff --exit-code vendor/ go.sum || \
          (echo "Error: Vendor directory is out of date. Run 'make vendor' and commit the changes." && exit 1)

    - name: Verify mocks are up to date
      run: |
        make gen-mocks
        git diff --exit-code pkg/providers/common/types/mock/ pkg/cloudprovider/ibm/mock/ pkg/providers/common/pricing/mock/ || \
          (echo "Error: Generated mocks are out of date. Run 'make gen-mocks' and commit the changes." && exit 1)

    - name: Verify generated code is up to date
      run: |
        make generate
        git diff --exit-code pkg/apis/ charts/crds/ || \
          (echo "Error: Generated code (CRDs/deepcopy) is out of date. Run 'make generate' and commit the changes." && exit 1)

    - name: Run tests
      run: |
        go test -v -race ./...

    - name: Run tests with coverage
      run: |
        go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '1.26'
        cache: true

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.x'

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '20'

    - name: Install pre-commit and dependencies
      run: |
        # Install pre-commit
        pip install pre-commit

        # Install shellcheck (already available in ubuntu-latest)
        which shellcheck || sudo apt-get install -y shellcheck

        # Install markdownlint-cli
        npm install -g markdownlint-cli

        # Install golangci-lint using go install (v2.11.4 supports Go 1.26)
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

    - name: Install mockgen
      run: |
        go install github.com/golang/mock/mockgen@latest

    - name: Generate mocks
      run: make gen-mocks

    - name: Run make lint
      run: |
        # Ensure golangci-lint is available in PATH for pre-commit
        export PATH="$(go env GOPATH)/bin:${PATH}"
        which golangci-lint
        golangci-lint version
        # Skip verify-codegen and verify-vendor hooks - already checked in test job
        SKIP=verify-codegen,verify-vendor make lint
